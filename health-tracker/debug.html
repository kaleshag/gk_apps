<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Tracker</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { padding: 10px; margin: 5px; }
        .debug { background: #f0f0f0; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Debug Food Tracker</h1>
    
    <div class="debug">
        <h3>Test Water</h3>
        <button onclick="testWater()">Add 0.5L Water</button>
        <div id="waterDisplay">Water: 0L</div>
    </div>
    
    <div class="debug">
        <h3>Test Steps</h3>
        <input type="number" id="testSteps" value="1000">
        <button onclick="testSteps()">Add Steps</button>
        <div id="stepsDisplay">Steps: 0</div>
    </div>
    
    <div class="debug">
        <h3>Test Food</h3>
        <input type="text" id="testFood" value="Apple" placeholder="Food name">
        <input type="number" id="testCalories" value="100" placeholder="Calories">
        <button onclick="testFood()">Add Food</button>
        <div id="foodDisplay">Foods: []</div>
    </div>
    
    <div class="debug">
        <h3>Console Log</h3>
        <div id="console" style="background: black; color: lime; padding: 10px; font-family: monospace;"></div>
    </div>
    
    <script>
        let testData = {
            waterIntake: 0,
            steps: 0,
            foods: []
        };
        
        function log(msg) {
            const console = document.getElementById('console');
            console.innerHTML += msg + '<br>';
            console.scrollTop = console.scrollHeight;
        }
        
        function testWater() {
            testData.waterIntake += 0.5;
            document.getElementById('waterDisplay').textContent = 'Water: ' + testData.waterIntake + 'L';
            log('✅ Water added: ' + testData.waterIntake + 'L');
        }
        
        function testSteps() {
            const steps = parseInt(document.getElementById('testSteps').value);
            testData.steps += steps;
            document.getElementById('stepsDisplay').textContent = 'Steps: ' + testData.steps;
            log('✅ Steps added: ' + testData.steps);
        }
        
        function testFood() {
            const name = document.getElementById('testFood').value;
            const calories = parseInt(document.getElementById('testCalories').value);
            testData.foods.push({ name, calories });
            document.getElementById('foodDisplay').textContent = 'Foods: ' + JSON.stringify(testData.foods);
            log('✅ Food added: ' + name + ' (' + calories + ' cal)');
        }
        
        log('Debug tracker loaded successfully');
        log('Click buttons to test functionality');
    </script>
</body>
</html>
