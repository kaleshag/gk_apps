<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Test</title>
</head>
<body>
    <h1>Testing Food Tracker Functions</h1>
    <div id="results"></div>
    
    <script>
        // Simple test to verify functions work
        const results = document.getElementById('results');
        
        // Test 1: Check if we can create data
        let testData = {
            foods: [],
            workouts: [],
            waterIntake: 0,
            steps: 0
        };
        
        // Test 2: Add food
        testData.foods.push({
            id: Date.now(),
            name: "Test Food",
            calories: 100,
            mealType: "breakfast"
        });
        
        // Test 3: Add workout
        testData.workouts.push({
            id: Date.now(),
            name: "Test Workout",
            duration: 30,
            calories: 200
        });
        
        // Test 4: Add water
        testData.waterIntake = 0.5;
        
        // Test 5: Add steps
        testData.steps = 1000;
        
        results.innerHTML = `
            <h2>Test Results:</h2>
            <p>✅ Foods: ${testData.foods.length} item(s)</p>
            <p>✅ Workouts: ${testData.workouts.length} item(s)</p>
            <p>✅ Water: ${testData.waterIntake}L</p>
            <p>✅ Steps: ${testData.steps}</p>
            <p><strong>Basic JavaScript is working!</strong></p>
            <p>Now testing the actual app...</p>
        `;
        
        // Load the actual app script
        setTimeout(() => {
            const script = document.createElement('script');
            script.src = 'app.js';
            script.onload = () => {
                results.innerHTML += '<p>✅ app.js loaded successfully!</p>';
            };
            script.onerror = () => {
                results.innerHTML += '<p>❌ Error loading app.js</p>';
            };
            document.body.appendChild(script);
        }, 1000);
    </script>
</body>
</html>
