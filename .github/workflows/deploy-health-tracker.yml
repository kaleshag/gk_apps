name: Deploy Health & Habits Tracker

on:
  push:
    branches: [ main ]
    paths:
      - 'health-tracker/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'health-tracker/**'

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Validate HTML
      run: |
        echo "Validating HTML files..."
        # Check if required files exist
        test -f health-tracker/index.html || exit 1
        test -f health-tracker/manifest.json || exit 1
        test -f health-tracker/service-worker.js || exit 1
        echo "✅ All required files present"
    
    - name: Check for icons
      run: |
        if [ ! -f health-tracker/icon-192.png ] || [ ! -f health-tracker/icon-512.png ]; then
          echo "⚠️ Warning: App icons missing. PWA installation may not work properly."
          echo "Please add icon-192.png and icon-512.png"
        else
          echo "✅ App icons found"
        fi
    
    - name: Validate JSON files
      run: |
        echo "Validating JSON syntax..."
        python3 -m json.tool health-tracker/manifest.json > /dev/null
        echo "✅ manifest.json is valid"
    
    - name: Check service worker paths
      run: |
        echo "Checking service worker configuration..."
        if grep -q "'/index.html'" health-tracker/service-worker.js; then
          echo "❌ Error: Service worker uses absolute paths. Should use relative paths (./)."
          exit 1
        fi
        echo "✅ Service worker paths are correct"
    
    - name: Deployment info
      run: |
        echo "🚀 Deployment will be available at:"
        echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/health-tracker/"
        echo ""
        echo "📱 To install on mobile:"
        echo "1. Visit the URL above"
        echo "2. Tap 'Add to Home Screen'"
        echo "3. Enjoy offline access!"
